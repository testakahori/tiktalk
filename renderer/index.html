<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiktok Talk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ヘッダー -->
    <header class="app-header">
      <h1>🎵 Tiktok Talk</h1>
      <div class="status-pill" id="status-pill">
        <div class="dot"></div>
        <span id="status-text">未接続</span>
      </div>
    </header>

    <!-- 接続 -->
    <section class="card">
      <div class="card-title">TikTokアカウント</div>
      <div class="connect-row">
        <div class="input-with-prefix">
          <span class="input-prefix">@</span>
          <input type="text" id="username-input" placeholder="ユーザー名を入力">
        </div>
        <button class="btn btn-primary" id="connect-btn">接続</button>
        <button class="btn btn-danger" id="disconnect-btn" style="display:none">切断</button>
      </div>
      <div id="connect-error" style="color:#ff2d55; font-size:12px; margin-top:8px; display:none;"></div>
    </section>

    <!-- エンジン設定 -->
    <section class="card">
      <div class="card-title">エンジン設定</div>

      <div class="engine-tabs">
        <div class="engine-tab active" data-engine="voicevox">VOICEVOX</div>
        <div class="engine-tab" data-engine="aivis">AivisSpeech</div>
      </div>

      <div class="engine-launch-row">
        <button class="btn btn-launch" id="launch-btn">▶ 起動する</button>
        <span class="launch-note">※ Cドライブへのインストールが必要</span>
      </div>

      <div class="engine-status checking" id="engine-status">確認中...</div>

      <div class="setting-row">
        <div class="setting-label">声</div>
        <select id="speaker-select">
          <option value="">読み込み中...</option>
        </select>
      </div>
    </section>

    <!-- 読み上げ設定 -->
    <section class="card">
      <div class="card-title">読み上げ設定</div>

      <div class="setting-row">
        <div class="setting-label">
          <span>速さ</span>
          <span class="setting-value" id="speed-label">1.2</span>
        </div>
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.2">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          <span>音量</span>
          <span class="setting-value" id="volume-label">100%</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          <span>声の高さ</span>
          <span class="setting-value" id="pitch-label">0.0</span>
        </div>
        <input type="range" id="pitch-slider" min="-0.15" max="0.15" step="0.01" value="0">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          <span>抑揚（テンポの緩急）</span>
          <span class="setting-value" id="intonation-label">1.0</span>
        </div>
        <input type="range" id="intonation-slider" min="0" max="2" step="0.1" value="1">
      </div>

      <div class="toggle-row">
        <span class="toggle-label">入室を「〇〇さん、いらっしゃい」と読む</span>
        <label class="toggle">
          <input type="checkbox" id="read-join-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">名前も読み上げる</span>
        <label class="toggle">
          <input type="checkbox" id="read-name-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </section>

    <!-- NGワード -->
    <section class="card">
      <div class="card-title">名前 NGワード設定</div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">名前にNGワード → 名前を読まない　／　コメントにNGワード → 丸ごとスキップ</p>
      <div class="connect-row" style="margin-bottom:10px;">
        <input type="text" id="ng-input" placeholder="NGワードを入力" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:13px;outline:none;">
        <button class="btn btn-primary" id="ng-add-btn">追加</button>
      </div>
      <div id="ng-list" class="ng-list"></div>
    </section>

    <!-- 読み上げ中 -->
    <section class="card">
      <div class="feed-header">
        <div class="card-title" style="margin-bottom:0">コメントログ</div>
        <div class="queue-badge" id="queue-badge">待機 0件</div>
      </div>

      <div class="now-reading idle" id="now-reading">
        <div class="sound-bars">
          <div class="sound-bar"></div>
          <div class="sound-bar"></div>
          <div class="sound-bar"></div>
          <div class="sound-bar"></div>
        </div>
        <div class="now-reading-text" id="now-reading-text">待機中</div>
      </div>

      <div class="skip-btn-row">
        <button class="btn btn-danger btn-sm" id="skip-btn">キューをスキップ</button>
      </div>

      <div class="comment-feed" id="comment-feed">
        <div class="empty-hint">接続するとコメントが表示されるわよ</div>
      </div>
    </section>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
